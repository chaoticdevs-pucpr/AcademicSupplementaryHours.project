<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Alterar Professor Validador</title>
</head>
<body>

    <header>
        <div>
            <div>
                <span>
                    A.S.H<span>.</span>
                </span>
                <span>
                    Coordenador
                </span>
            </div>
            <nav>
                <a href="../prof_validador_index.html" >Lista Professores</a>
                <div></div>
                <button id="logoff">
                    Sair
                </button>
            </nav>
        </div>
    </header>

    <main>
        
        <div>
            <h1>Alterar Professor Validador</h1>
            <p>Modifique os dados do docente responsável pela validação das horas complementares.</p>
        </div>

        <div>
            <div>
                
                <input type="hidden" id="id">

                <div>
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite o nome do professor" required>
                </div>

                <div>
                    <div>
                        <label for="email">E-mail Institucional</label>
                        <input type="email" id="email" placeholder="professor@instituicao.edu.br" required>
                    </div>
                    <div>
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="••••••••" required>
                    </div>
                </div>

                <div>
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="00000000000" required inputmode="numeric" pattern="[0-9]{11}">
                </div>

                <div>
                    <div>
                        <label for="celular">Celular / WhatsApp</label>
                        <input type="text" id="celular" placeholder="11999999999" required inputmode="numeric" pattern="[0-9]{10,11}">
                    </div>
                    <div>
                        <label for="telefone">Telefone Fixo</label>
                        <input type="text" id="telefone" placeholder="1133333333" inputmode="numeric" pattern="[0-9]{10,11}">
                    </div>
                </div>

                <div>
                    <div>
                        <label for="turma_id">Turma</label>
                        <select id="turma_id" required>
                            <option value="">Carregando turmas...</option>
                        </select>
                    </div>
                    <div>
                        <label for="curso_nome">Curso da Turma</label>
                        <input type="text" id="curso_nome" readonly placeholder="Automático ao selecionar turma">
                    </div>
                </div>

            </div>

            <div >
                <button id="enviar">
                    Salvar Alterações
                </button>
            </div>
        </div>


        <div>
            <a href="../prof_validador_index.html">
                Voltar para a lista de professores
            </a>
        </div>

    </main>

    <!-- Scripts de Lógica -->
    <script src="../../../../z_js/valida_sessao.js"></script>
    <script src="../js/prof_validador_alterar.js"></script>
</body>
</html>
