<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Nova Configuração HC</title>
</head>
<body>

    <header>
        <div>
            <div>
                <span>
                    A.S.H<span>.</span>
                </span>
                <span>
                    Coordenador
                </span>
            </div>
            <nav>
                <a href="../config_hc_index.html">Lista Configurações</a>
                <a href="../../prof_validador/prof_validador_index.html">Prof. Validador</a>
                <div></div>
                <button id="logoff">
                    Sair
                </button>
            </nav>
        </div>
    </header>

    <main>
        
        <div>
            <h1>Nova Configuração HC</h1>
            <p>Cadastre as regras de categorias e subcategorias do manual de horas complementares.</p>
        </div>

        <div>
            <div>
                
                <div>
                    <h3>
                        Dados do Manual
                    </h3>
                    <div>
                        <div>
                            <label for="versao">Versão Manual</label>
                            <input type="text" id="versao" value="2026.1">
                        </div>
                        <div>
                            <label for="data_manual">Data Manual</label>
                            <input type="date" id="data_manual">
                        </div>
                        <div>
                            <label for="horas_objetivo">Horas Objetivo (Meta)</label>
                            <input type="number" id="horas_objetivo" value="120">
                        </div>
                    </div>
                </div>

                <hr>

                <div>
                    <h3>
                        Categoria Principal
                    </h3>
                    <div>
                        <div>
                            <label for="categoria_nome" >Nome da Categoria</label>
                            <select id="categoria_nome">
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                        <div>
                            <label for="categoria_max">Máximo de Horas Permitido</label>
                            <input type="number" id="categoria_max" placeholder="Limite global da categoria">
                        </div>
                    </div>
                </div>

                <hr>

                <div>
                    <h3>
                        Atividade Específica (Subcategoria)
                    </h3>
                    <div>
                        <div>
                            <label for="subcategoria_nome">Nome da Subcategoria</label>
                            <select id="subcategoria_nome">
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                        <div>
                            <label for="subcategoria_horas">Horas por Atividade</label>
                            <input type="number" id="subcategoria_horas" placeholder="Valor em horas">
                        </div>
                    </div>
                </div>

            </div>

            <div>
                <button id="enviar">
                    Salvar Configuração
                </button>
            </div>
        </div>

        <div>
            <a href="../config_hc_index.html">
                Voltar para a lista de configurações
            </a>
        </div>

    </main>

    <script src="../../../../z_js/valida_sessao.js"></script>
    <script src="../js/config_hc_novo.js"></script>
</body>
</html>
