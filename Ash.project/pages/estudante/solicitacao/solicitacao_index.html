<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Minhas Solicitações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    </style>
</head> 
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col selection:bg-indigo-200 selection:text-indigo-900">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-6">
                    <a href="../index.html" class="text-slate-400 hover:text-indigo-600 transition-colors flex items-center justify-center bg-slate-50 hover:bg-indigo-50 w-10 h-10 rounded-full" title="Início">
                        <i data-lucide="home" class="w-5 h-5"></i>
                    </a>
                    <div class="flex items-center gap-3 border-l border-slate-200 pl-6">
                        <div class="text-2xl font-extrabold tracking-tighter text-slate-900">
                            A.S.H<span class="text-indigo-600">.</span>
                        </div>
                        <span class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2.5 py-1 rounded-md uppercase tracking-wide hidden sm:inline-block">
                            Estudante
                        </span>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button id="logoff" class="text-sm font-medium text-red-600 hover:text-red-700 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors flex items-center gap-2">
                        <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Sair do Sistema</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
        
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center gap-3">
                    <div class="bg-indigo-100 p-2 rounded-xl text-indigo-600">
                        <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                    </div>
                    Painel de Horas
                </h1>
                <p class="text-slate-500 mt-2 text-sm sm:text-base">Acompanhe o progresso das suas solicitações de horas complementares.</p>
            </div>
            
            <a href="html/solicitacao_nova.html" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-3 rounded-xl transition-all shadow-sm hover:shadow-md flex items-center justify-center gap-2 w-full sm:w-auto whitespace-nowrap shrink-0">
                <i data-lucide="plus" class="w-5 h-5"></i> Nova Solicitação
            </a>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden min-h-[400px]">
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Histórico de Atividades</span>
            </div>

            <div id="lista" class="divide-y divide-slate-100">
                <div class="p-16 flex flex-col items-center justify-center text-center">
                    <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4 text-slate-300">
                        <i data-lucide="inbox" class="w-8 h-8"></i>
                    </div>
                    <p class="text-slate-400 text-sm">Carregando suas solicitações...</p>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-slate-900 py-8 border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-sm text-slate-500">
                &copy; <span id="current-year"></span> ChaoticDevs - ASH.
            </p>
            <div class="flex space-x-6">
                <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Termos</a>
                <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Privacidade</a>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
    
    <script src="../../../z_js/valida_sessao.js"></script>
    <script src="solicitacao_index.js"></script>
</body>
</html>
