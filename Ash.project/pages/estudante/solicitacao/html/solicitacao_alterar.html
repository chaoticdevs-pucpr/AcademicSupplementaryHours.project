<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Alterar Solicitação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col selection:bg-indigo-200 selection:text-indigo-900">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-4 sm:gap-6">
                    <a href="../../index.html" class="text-slate-400 hover:text-indigo-600 transition-colors flex items-center justify-center bg-slate-50 hover:bg-indigo-50 w-10 h-10 rounded-full" title="Início">
                        <i data-lucide="home" class="w-5 h-5"></i>
                    </a>
                    <div class="flex items-center gap-3 border-l border-slate-200 pl-6">
                        <div class="text-2xl font-extrabold tracking-tighter text-slate-900">
                            A.S.H<span class="text-indigo-600">.</span>
                        </div>
                        <span class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2.5 py-1 rounded-md uppercase tracking-wide hidden sm:inline-block">
                            Estudante
                        </span>
                    </div>
                </div>

                <button id="logoff" class="text-sm font-medium text-red-600 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors flex items-center gap-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Sair</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-10">
        
        <div class="mb-8 text-center sm:text-left">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center justify-center sm:justify-start gap-3">
                <div class="bg-indigo-100 p-2 rounded-xl text-indigo-600">
                    <i data-lucide="edit-3" class="w-6 h-6"></i>
                </div>
                Alterar Solicitação
            </h1>
            <p class="text-slate-500 mt-2">Atualize as informações da sua solicitação de horas complementares.</p>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 sm:p-8 space-y-6">
            
            <input type="hidden" id="id">

            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2 mb-4">
                <span class="w-1.5 h-6 bg-indigo-600 rounded-full"></span>
                Editar Dados
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="categoria_id" class="block text-sm font-bold text-slate-700 mb-2">Categoria</label>
                    <select id="categoria_id" 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 transition-all outline-none appearance-none cursor-pointer">
                        </select>
                </div>

                <div>
                    <label for="subcategoria_id" class="block text-sm font-bold text-slate-700 mb-2">Subcategoria</label>
                    <select id="subcategoria_id" 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 transition-all outline-none appearance-none cursor-pointer">
                        </select>
                </div>
            </div>

            <div>
                <label for="horas_brutas" class="block text-sm font-bold text-slate-700 mb-2">Horas Brutas</label>
                <div class="relative">
                    <input type="number" step="0.01" id="horas_brutas" 
                        class="w-full pl-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 transition-all outline-none" 
                        placeholder="0.00">
                    <span class="absolute right-4 top-3 text-slate-400 text-sm font-medium">hrs</span>
                </div>
            </div>

            <div>
                <label for="justificativa" class="block text-sm font-bold text-slate-700 mb-2">Justificativa</label>
                <textarea id="justificativa" rows="4" 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 transition-all outline-none resize-none" 
                    placeholder="Altere sua justificativa aqui..."></textarea>
            </div>

            <div>
                <label for="arquivo" class="block text-sm font-bold text-slate-700 mb-2">Novo Anexo (Opcional)</label>
                <div class="relative group">
                    <input type="file" id="arquivo" 
                        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                    <div class="border-2 border-dashed border-slate-200 rounded-2xl p-6 flex flex-col items-center justify-center group-hover:border-indigo-400 group-hover:bg-indigo-50/50 transition-all">
                        <i data-lucide="upload-cloud" class="w-10 h-10 text-slate-400 mb-2 group-hover:text-indigo-500"></i>
                        <p class="text-sm text-slate-600 font-medium text-center">Clique para substituir o certificado</p>
                        <p id="file-selected-name" class="text-xs text-indigo-600 font-bold mt-2 hidden text-center"></p>
                    </div>
                </div>
                <p class="text-[10px] text-slate-400 mt-2 italic text-center">Se não desejar alterar o arquivo, deixe este campo vazio.</p>
            </div>

            <div class="pt-4">
                <button id="enviar" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-md hover:shadow-indigo-200 flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i> Salvar Alterações
                </button>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 py-8 border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-sm text-slate-500">
                &copy; <span id="current-year"></span> ChaoticDevs - ASH.
            </p>
            <div class="flex space-x-6">
                <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Termos</a>
                <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Privacidade</a>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Feedback visual do arquivo
        const fileInput = document.getElementById('arquivo');
        const fileNameText = document.getElementById('file-selected-name');
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameText.textContent = `Selecionado: ${e.target.files[0].name}`;
                fileNameText.classList.remove('hidden');
            }
        });
    </script>
    
    <script src="../../../../z_js/valida_sessao.js"></script>
    <script src="../js/solicitacao_alterar.js"></script>
</body>
</html>
