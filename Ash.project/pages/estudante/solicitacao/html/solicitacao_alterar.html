<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Alterar Solicitação</title>
</head>
<body>

    <header>
        <div>
            <div>
                <div>
                    <a href="../../index.html" title="Início">
                        <i data-lucide="home"></i>
                    </a>
                    <div>
                        <div>
                            A.S.H<span>.</span>
                        </div>
                        <span>
                            Estudante
                        </span>
                    </div>
                </div>

                <button id="logoff">
                    <span>Sair</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        
        <div>
            <h1>
                Alterar Solicitação
            </h1>
            <p>Atualize as informações da sua solicitação de horas complementares.</p>
        </div>

        <div>
            
            <input type="hidden" id="id">

            <h2>
                <span></span>
                Editar Dados
            </h2>

            <div>
                <div>
                    <label for="categoria_id">Categoria</label>
                    <select id="categoria_id"></select>
                </div>

                <div>
                    <label for="subcategoria_id">Subcategoria</label>
                    <select id="subcategoria_id"></select> 
                </div>
            </div>

            <div>
                <label for="horas_brutas">Horas Brutas</label>
                <div>
                    <input type="number" step="0.01" id="horas_brutas" 
                        placeholder="0.00">
                    <span>hrs</span>
                </div>
            </div>

            <div>
                <label for="justificativa">Justificativa</label>
                <textarea id="justificativa" rows="4" 
                    placeholder="Altere sua justificativa aqui..."></textarea>
            </div>

            <div>
                <label for="arquivo">Novo Anexo (Opcional)</label>
                <div>
                    <input type="file" id="arquivo">
                    <div>
                        <i data-lucide="upload-cloud"></i>
                        <p>Clique para substituir o certificado</p>
                        <p id="file-selected-name"></p>
                    </div>
                </div>
                <p>Se não desejar alterar o arquivo, deixe este campo vazio.</p>
            </div>

            <div>
                <button id="enviar">
                    Salvar Alterações
                </button>
            </div>
        </div>
    </main>

    <footer>
        <div>
            <p>
                <span id="current-year"></span> ChaoticDevs - ASH.
            </p>
            <div>
                <a href="#">Termos</a>
                <a href="#">Privacidade</a>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Feedback visual do arquivo
        const fileInput = document.getElementById('arquivo');
        const fileNameText = document.getElementById('file-selected-name');
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameText.textContent = `Selecionado: ${e.target.files[0].name}`;
                fileNameText.classList.remove('hidden');
            }
        });
    </script>
    
    <script src="../../../../z_js/valida_sessao.js"></script>
    <script src="../js/solicitacao_alterar.js"></script>
</body>
</html>
