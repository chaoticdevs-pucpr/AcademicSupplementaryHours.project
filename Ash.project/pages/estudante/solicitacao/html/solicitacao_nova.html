<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Nova Solicitação HC</title>
</head>
<body>

    <header>
        <div>
            <div>
                <div>
                    <a href="../../index.html" title="Início">inicio
                    </a>
                    <div>
                    <div>
                        A.S.H<span>.</span>
                    </div>
                    <span>
                        Estudante
                    </span>
                </div>
                </div>

                <button id="logoff">
                    <span>Sair</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        
        <div>
            <h1>
                Nova Solicitação
            </h1>
            <p>Envie suas horas complementares preenchendo os dados abaixo.</p>
        </div>

        <div>
            
            <h2>
                <span></span>
                Dados da Atividade
            </h2>

            <div>
                <div>
                    <label for="categoria_id">Categoria</label>
                    <select id="categoria_id"></select>
                </div>

                <div>
                    <label for="subcategoria_id">Subcategoria</label>
                    <select id="subcategoria_id"></select>
                </div>
            </div>

            <div>
                <label for="horas_brutas">Horas Brutas</label>
                <div>
                    <input type="number" step="0.01" id="horas_brutas" 
                        placeholder="Ex: 20.00">
                    <span>hrs</span>
                </div>
            </div>

            <div>
                <label for="justificativa">Justificativa</label>
                <textarea id="justificativa" rows="4" 
                    placeholder="Descreva brevemente a atividade realizada..."></textarea>
            </div>

            <div>
                <label for="arquivo">Anexo (Certificado)</label>
                <div>
                    <input type="file" id="arquivo">
                    <div>
                        <i data-lucide="upload-cloud"></i>
                        <p>Clique para selecionar o certificado</p>
                        <p id="file-selected-name"></p>
                    </div>
                </div>
            </div>

            <div>
                <button id="enviar">
                    Salvar Solicitação
                </button>
            </div>
        </div>
    </main>

   <footer>
        <div>
            <div>
                <p>
                  <span id="current-year"></span> ChaoticDevs - Academic Supplementary Hours. Todos os direitos reservados.
                </p>
                <div>
                    <a href="#">Termos</a>
                    <a href="#">Privacidade</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Script visual para mostrar nome do arquivo
        const fileInput = document.getElementById('arquivo');
        const fileNameText = document.getElementById('file-selected-name');
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameText.textContent = `Selecionado: ${e.target.files[0].name}`;
                fileNameText.classList.remove('hidden');
            }
        });
    </script>
    
    <script src="../../../../z_js/valida_sessao.js"></script>
    <script src="../js/solicitacao_nova.js"></script>
</body>
</html>
