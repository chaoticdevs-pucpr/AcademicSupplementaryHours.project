<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Painel do Estudante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col selection:bg-indigo-200 selection:text-indigo-900">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div class="text-2xl font-extrabold tracking-tighter text-slate-900">
                        A.S.H<span class="text-purple-600">.</span>
                    </div>
                    <span class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2.5 py-1 rounded-md uppercase tracking-wide">
                        Estudante
                    </span>
                </div>

                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="w-px h-5 bg-slate-200"></div>
                    <button id="logoff" class="text-sm font-medium text-red-600 hover:text-red-700 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors flex items-center gap-2">
                        <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Sair</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

   <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
    
    <!-- 1 & 2: Cabeçalho de Boas-vindas e Ação Principal -->
    <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
        <div class="text-center md:text-left">
            <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight">
                Bem-vindo, <span id="user-name" class="text-indigo-400">Estudante</span>! 
            </h1>
            <p class="text-slate-500 mt-1 text-sm">
                Que bom ter você de volta.
            </p>
        </div>
        
        <button id="solicitacoes" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-8 py-4 rounded-2xl transition-all shadow-lg shadow-indigo-100 flex items-center justify-center gap-3 group">
            <i data-lucide="file-text" class="w-5 h-5"></i>
            Acessar minhas solicitações
            <i data-lucide="chevron-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
        </button>
    </div>

    <!-- 3: Gráfico Geral e Categorias -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Card do Gráfico Geral (Critério 1) -->
        <div class="lg:col-span-1 bg-white rounded-3xl shadow-sm border border-slate-200 p-8 flex flex-col items-center justify-center">
            <h3 class="text-slate-500 font-bold text-xs uppercase tracking-widest mb-8">Progresso Total</h3>
            <div class="relative flex items-center justify-center">
                <svg class="w-32 sm:w-40 md:w-48 h-32 sm:h-40 md:h-48 transform -rotate-90">
                    <circle cx="96" cy="96" r="88" stroke="currentColor" stroke-width="12" fill="transparent" class="text-slate-100" />
                    <circle id="progress-circle" cx="96" cy="96" r="88" stroke="currentColor" stroke-width="12" fill="transparent" 
                        stroke-dasharray="552.9" stroke-dashoffset="552.9" class="text-indigo-600 transition-all duration-1000 ease-out" />
                </svg>
                <div class="absolute flex flex-col items-center">
                    <span id="main-percentage" class="text-3xl sm:text-4xl font-black text-slate-900">0%</span>
                    <span class="text-slate-400 text-xs font-medium">concluído</span>
                </div>
            </div>
            <div class="mt-8 text-center">
                <p class="text-slate-900 font-bold text-xl"><span id="hours-done">0</span>h <span class="text-slate-400 font-normal text-base">/ <span id="hours-target">200</span>h</span></p>
            </div>
        </div>

        <!-- Lista de Categorias e Subcategorias (Critério 2 e 3) -->
        <div class="lg:col-span-2 space-y-4">
            <h3 class="text-slate-500 font-bold text-xs uppercase tracking-widest mb-4">Detalhamento por Categoria</h3>
            <div id="categories-container" class="space-y-4">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 text-slate-500">
                    <p>Carregando as categorias...</p>
                </div>
            </div>

        </div>
    </div>
</main>

    <footer class="bg-slate-900 py-8 border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <p class="text-sm text-slate-500 text-center md:text-left">
                  &copy; <span id="current-year"></span> ChaoticDevs - Academic Supplementary Hours. Todos os direitos reservados.
                </p>
                <div class="flex space-x-6">
                    <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Termos</a>
                    <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Privacidade</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Inicializa ícones e ano
        lucide.createIcons();
        document.getElementById('current-year').textContent = new Date().getFullYear();
        
    </script>

    <script src="../../z_js/valida_sessao.js"></script>
    <script src="index.js"></script>
</body>
</body>
</html>
