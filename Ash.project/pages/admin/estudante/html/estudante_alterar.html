<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Alterar Estudante</title>
</head> 
<body>

    <header>
        <div>
            <div>
                <div>
                    <a href="../estudante_index.html">voltar</a>
                    <div>
                        <div>
                            A.S.H<span>.</span>
                        </div>
                        <span>
                            Admin
                        </span>
                    </div>
                </div>

                <div>
                    <button id="logoff">
                        <span>Sair</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main>
        
        <div>
            <h1>
                Alterar Estudante
            </h1>
            <p>Atualize as informações cadastrais do estudante selecionado.</p>
        </div>

        <div>
            <div>
                
                <input type="hidden" id="id">

                <div>
                    <div>
                        <label for="matricula_id" >Matrícula</label>
                        <input type="text" id="matricula_id" readonly>
                    </div>

                    <div>
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" required>
                    </div>
                </div>

                <div>
                    <div>
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required>
                    </div>

                    <div>
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" required>
                    </div>
                </div>

                <div>
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" required inputmode="numeric" pattern="[0-9]{11}">
                </div>

                <div>
                    <div>
                        <label for="celular">Celular</label>
                        <input type="text" id="celular" required inputmode="numeric" pattern="[0-9]{10,11}">
                    </div>

                    <div>
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" inputmode="numeric" pattern="[0-9]{10,11}">
                    </div>
                </div>

                <div>
                    <label for="turma_id">Turma Vinculada</label>
                    <select id="turma_id" required></select>
                </div>

            </div>

            <div>
                <button id="enviar">
                    Salvar Alterações
                </button>
            </div>
        </div>
    </main>

    <footer>
        <div>
            <div>
                <p>
                  <span id="current-year"></span> ChaoticDevs - Academic Supplementary Hours. Todos os direitos reservados.
                </p>
                <div>
                    <a href="#">Termos</a>
                    <a href="#">Privacidade</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
    <script src="../../../../z_js/valida_sessao.js"></script>
    <script src="../js/estudante_alterar.js"></script>
</body>
</html>
