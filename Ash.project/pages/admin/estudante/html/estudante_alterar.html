<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Alterar Estudante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    </style>
</head> 
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col selection:bg-purple-200 selection:text-purple-900">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-6">
                    <a href="../estudante_index.html" class="text-slate-400 hover:text-purple-600 transition-colors flex items-center justify-center bg-slate-50 hover:bg-purple-50 w-10 h-10 rounded-full" title="Voltar para Lista">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </a>
                    <div class="flex items-center gap-3 border-l border-slate-200 pl-6">
                        <div class="text-2xl font-extrabold tracking-tighter text-slate-900">
                            A.S.H<span class="text-purple-600">.</span>
                        </div>
                        <span class="bg-purple-100 text-purple-700 text-xs font-bold px-2.5 py-1 rounded-md uppercase tracking-wide hidden sm:inline-block">
                            Admin
                        </span>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button id="logoff" class="text-sm font-medium text-red-600 hover:text-red-700 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors flex items-center gap-2">
                        <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Sair</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-10">
        
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center gap-3">
                <div class="bg-purple-100 p-2 rounded-xl text-purple-600">
                    <i data-lucide="user-cog" class="w-6 h-6"></i>
                </div>
                Alterar Estudante
            </h1>
            <p class="text-slate-500 mt-2 text-sm sm:text-base">Atualize as informações cadastrais do estudante selecionado.</p>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 sm:p-8 space-y-6">
                
                <input type="hidden" id="id">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="matricula_id" class="block text-sm font-bold text-slate-700 mb-2">Matrícula</label>
                        <input type="text" id="matricula_id" readonly 
                            class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl text-slate-500 font-medium cursor-not-allowed outline-none">
                    </div>

                    <div>
                        <label for="nome" class="block text-sm font-bold text-slate-700 mb-2">Nome Completo</label>
                        <input type="text" id="nome" required
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-purple-200 focus:border-purple-500 transition-all outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="email" class="block text-sm font-bold text-slate-700 mb-2">E-mail</label>
                        <input type="email" id="email" required
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-purple-200 focus:border-purple-500 transition-all outline-none">
                    </div>

                    <div>
                        <label for="senha" class="block text-sm font-bold text-slate-700 mb-2">Senha</label>
                        <input type="password" id="senha" required
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-purple-200 focus:border-purple-500 transition-all outline-none">
                    </div>
                </div>

                <div>
                    <label for="cpf" class="block text-sm font-bold text-slate-700 mb-2">CPF</label>
                    <input type="text" id="cpf" required inputmode="numeric" pattern="[0-9]{11}"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-purple-200 focus:border-purple-500 transition-all outline-none">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="celular" class="block text-sm font-bold text-slate-700 mb-2">Celular</label>
                        <input type="text" id="celular" required inputmode="numeric" pattern="[0-9]{10,11}"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-purple-200 focus:border-purple-500 transition-all outline-none">
                    </div>

                    <div>
                        <label for="telefone" class="block text-sm font-bold text-slate-700 mb-2">Telefone</label>
                        <input type="text" id="telefone" inputmode="numeric" pattern="[0-9]{10,11}"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-purple-200 focus:border-purple-500 transition-all outline-none">
                    </div>
                </div>

                <div>
                    <label for="turma_id" class="block text-sm font-bold text-slate-700 mb-2">Turma Vinculada</label>
                    <select id="turma_id" required
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-purple-200 focus:border-purple-500 transition-all outline-none appearance-none cursor-pointer">
                        </select>
                </div>

            </div>

            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end">
                <button id="enviar" class="bg-purple-600 hover:bg-purple-700 text-white px-10 py-3 rounded-xl text-sm font-bold transition-all shadow-sm hover:shadow-md flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    Salvar Alterações
                </button>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 py-8 border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <p class="text-sm text-slate-500 text-center md:text-left">
                  &copy; <span id="current-year"></span> ChaoticDevs - Academic Supplementary Hours. Todos os direitos reservados.
                </p>
                <div class="flex space-x-6">
                    <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Termos</a>
                    <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Privacidade</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
    <script src="../../../../z_js/valida_sessao.js"></script>
    <script src="../js/estudante_alterar.js"></script>
</body>
</html>
