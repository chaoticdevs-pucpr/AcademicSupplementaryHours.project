<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Novo Estudante</title>
</head>
<body>

    <header>
        <div>
            <div>
                <span>
                    A.S.H<span>.</span>
                </span>
                <span>
                    Admin
                </span>
            </div>
            <nav>
                <a href="../estudante_index.html">Lista Estudantes</a>
                <a href="../../coordenador/coordenador_index.html">Coordenadores</a>
                <div></div>
                <button id="logoff">
                    Sair
                </button>
            </nav>
        </div>
    </header>

    <main>
        
        <div>
            <h1>Novo Estudante</h1>
            <p>Preencha os dados do aluno para realizar a matrícula no sistema.</p>
        </div>

        <div>
            <div>
                
                <div>
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite o nome do estudante" required>
                </div>

                <div>
                    <div>
                        <label for="email">E-mail Acadêmico</label>
                        <input type="email" id="email" placeholder="estudante@instituicao.edu.br" required>
                    </div>
                    <div>
                        <label for="senha">Senha de Acesso</label>
                        <input type="password" id="senha" placeholder="••••••••" required>
                    </div>
                </div>

                <div>
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="00000000000" required inputmode="numeric" pattern="[0-9]{11}">
                </div>

                <div>
                    <div>
                        <label for="celular">Celular / WhatsApp</label>
                        <input type="text" id="celular" placeholder="11999999999" required inputmode="numeric" pattern="[0-9]{10,11}">
                    </div>
                    <div>
                        <label for="telefone">Telefone Residencial</label>
                        <input type="text" id="telefone" placeholder="1133333333" inputmode="numeric" pattern="[0-9]{10,11}">
                    </div>
                </div>

                <div>
                    <label for="turma_id">Turma</label>
                    <div>
                        <select id="turma_id" required>
                            <option value="">Carregando turmas...</option>
                        </select>
                    </div>
                </div>

            </div>

            <div>
                <button id="enviar">
                    Salvar Estudante
                </button>
            </div>
        </div>

        <div>
            <a href="../estudante_index.html"></a>
                Voltar para a lista de estudantes
            </a>
        </div>

    </main>

    <footer>
        <div>
            <div>
                <p>
                  <span id="current-year"></span> ChaoticDevs - Academic Supplementary Hours. Todos os direitos reservados.
                </p>
                <div>
                    <a href="#">Termos</a>
                    <a href="#">Privacidade</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="../../../../z_js/valida_sessao.js"></script>
    <script src="../js/estudante_novo.js"></script>
</body>
</html>
