<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Alterar Coordenador</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col selection:bg-purple-200 selection:text-purple-900">

    <!-- Cabeçalho (Header) -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl font-extrabold tracking-tighter text-slate-900">
                    A.S.H<span class="text-purple-600">.</span>
                </span>
                <span class="bg-purple-100 text-purple-700 text-xs font-bold px-2.5 py-1 rounded-md uppercase tracking-wide hidden sm:inline-block">
                    Admin
                </span>
            </div>
            <nav class="flex items-center gap-4 sm:gap-6">
                <a href="../coordenador_index.html" class="text-sm font-medium text-slate-600 hover:text-purple-600 transition-colors">Lista Coordenadores</a>
                <div class="w-px h-5 bg-slate-200"></div>
                <button id="logoff" class="text-sm font-medium text-red-600 hover:text-red-700 flex items-center gap-2 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Sair
                </button>
            </nav>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-12">
        
        <!-- Título da Página -->
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Alterar Coordenador</h1>
            <p class="text-slate-500 mt-2 text-sm">Modifique as informações necessárias abaixo para atualizar o registo no sistema.</p>
        </div>

        <!-- Card do Formulário -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 sm:p-8 space-y-6">
                
                <!-- ID oculto -->
                <input type="hidden" id="id">

                <!-- Nome Completo -->
                <div>
                    <label for="nome" class="block text-sm font-semibold text-slate-700 mb-1.5">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite o nome completo" required
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all">
                </div>

                <!-- Grid E-mail e Senha -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">E-mail</label>
                        <input type="email" id="email" placeholder="email@exemplo.com" required
                            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all">
                    </div>
                    <div>
                        <label for="senha" class="block text-sm font-semibold text-slate-700 mb-1.5">Senha</label>
                        <input type="password" id="senha" placeholder="••••••••" required
                            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <!-- CPF -->
                <div>
                    <label for="cpf" class="block text-sm font-semibold text-slate-700 mb-1.5">CPF</label>
                    <input type="text" id="cpf" placeholder="00000000000" required inputmode="numeric" pattern="[0-9]{11}"
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all">
                </div>

                <!-- Grid Telefones -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label for="celular" class="block text-sm font-semibold text-slate-700 mb-1.5">Celular</label>
                        <input type="text" id="celular" placeholder="11999999999" required inputmode="numeric" pattern="[0-9]{10,11}"
                            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all">
                    </div>
                    <div>
                        <label for="telefone" class="block text-sm font-semibold text-slate-700 mb-1.5">Telefone Fixo</label>
                        <input type="text" id="telefone" placeholder="1133333333" inputmode="numeric" pattern="[0-9]{10,11}"
                            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <!-- Curso -->
                <div>
                    <label for="curso_id" class="block text-sm font-semibold text-slate-700 mb-1.5">Curso Vinculado</label>
                    <select id="curso_id" required
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all appearance-none">
                        <!-- Cursos carregados via JS -->
                    </select>
                </div>

            </div>

            <!-- Rodapé do Card com Botão -->
            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end">
                <button id="enviar" class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-2.5 rounded-xl text-sm font-bold transition-all shadow-sm hover:shadow-md flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Salvar Alterações
                </button>
            </div>
        </div>

        <div class="mt-6 text-center">
            <a href="../coordenador_index.html" class="text-sm text-slate-500 hover:text-slate-800 transition-colors">
                &larr; Cancelar e voltar para a lista
            </a>
        </div>

    </main>

    <footer class="bg-slate-900 py-8 border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <p class="text-sm text-slate-500 text-center md:text-left">
                  &copy; <span id="current-year"></span> ChaoticDevs - Academic Supplementary Hours. Todos os direitos reservados.
                </p>
                <div class="flex space-x-6">
                    <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Termos</a>
                    <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Privacidade</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="../../../../z_js/valida_sessao.js"></script>
    <script src="../js/coordenador_alterar.js"></script>
</body>
</html>
