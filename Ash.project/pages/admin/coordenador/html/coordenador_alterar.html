<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Alterar Coordenador</title>
</head>
<body>

    <header>
        <div>
            <div>
                <span>
                    A.S.H<span>.</span>
                </span>
                <span>
                    Admin
                </span>
            </div>
            <nav>
                <a href="../coordenador_index.html">Lista Coordenadores</a>
                <div></div>
                <button id="logoff">
                    Sair
                </button>
            </nav>
        </div>
    </header>

    <main>
        
        <div>
            <h1>Alterar Coordenador</h1>
            <p>Modifique as informações necessárias abaixo para atualizar o registo no sistema.</p>
        </div>

        <div>
            <div>
                
                <input type="hidden" id="id">

                <div>
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite o nome completo" required>
                </div>

                <div>
                    <div>
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="email@exemplo.com" required>
                    </div>
                    <div>
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="••••••••" required>
                    </div>
                </div>

                <div>
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="00000000000" required inputmode="numeric" pattern="[0-9]{11}">
                </div>

                <div>
                    <div>
                        <label for="celular">Celular</label>
                        <input type="text" id="celular" placeholder="11999999999" required inputmode="numeric" pattern="[0-9]{10,11}">
                    </div>
                    <div>
                        <label for="telefone">Telefone Fixo</label>
                        <input type="text" id="telefone" placeholder="1133333333" inputmode="numeric" pattern="[0-9]{10,11}">
                    </div>
                </div>

                <div>
                    <label for="curso_id">Curso Vinculado</label>
                    <select id="curso_id" required></select>
                </div>

            </div>

            <div>
                <button id="enviar">
                    Salvar Alterações
                </button>
            </div>
        </div>

        <div>
            <a href="../coordenador_index.html">
                Cancelar e voltar para a lista
            </a>
        </div>

    </main>

    <footer>
        <div>
            <div>
                <p>
                  <span id="current-year"></span> ChaoticDevs - Academic Supplementary Hours. Todos os direitos reservados.
                </p>
                <div>
                    <a href="#">Termos</a>
                    <a href="#">Privacidade</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="../../../../z_js/valida_sessao.js"></script>
    <script src="../js/coordenador_alterar.js"></script>
</body>
</html>
