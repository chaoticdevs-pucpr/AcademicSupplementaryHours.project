<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Solicitações</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col selection:bg-purple-200 selection:text-purple-900">

    <!-- Cabeçalho (Header) -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between gap-3 py-3 sm:h-16">
                <div class="flex items-center gap-4 sm:gap-6 min-w-0">
                    <a href="index.html" class="text-slate-400 hover:text-purple-600 transition-colors flex items-center justify-center bg-slate-50 hover:bg-purple-50 w-10 h-10 rounded-full" title="Voltar">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </a>
                    <div class="flex items-center gap-3 border-l border-slate-200 pl-6 min-w-0">
                        <div class="text-2xl font-extrabold tracking-tighter text-slate-900 whitespace-nowrap">
                            A.S.H<span class="text-purple-600">.</span>
                        </div>
                        <span class="bg-rose-100 text-rose-700 text-xs font-bold px-2.5 py-1 rounded-md uppercase tracking-wide hidden sm:inline-flex whitespace-nowrap">
                            Professor Validador
                        </span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-px h-5 bg-slate-200"></div>
                    <button id="logoff" class="text-sm font-medium text-red-600 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors flex items-center gap-2 whitespace-nowrap">
                        <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Sair</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 md:py-12">
        
        <!-- Título e Filtro -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Solicitações</h1>
                <p class="text-slate-500 mt-2 text-sm">Veja todas as solicitações pendentes, aprovadas e recusadas.</p>
            </div>

            <!-- Filtro de Situação Estilizado -->
            <form class="relative w-full sm:w-auto">
                <select name="Situacao" id="situacao" class="w-full sm:w-48 appearance-none bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-semibold text-slate-700 hover:border-purple-300 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent cursor-pointer shadow-sm transition-all pr-10">
                    <option value="pendentes">Pendentes</option>
                    <option value="aprovadas">Aprovadas</option>
                    <option value="rejeitadas">Rejeitadas</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400">
                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                </div>
            </form>
        </div>

        <!-- Container da Lista -->
        <div id="lista" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <!-- A tabela será injetada aqui -->
        </div>

    </main>

    <!-- ========================================== -->
    <!-- MODAL DE VISUALIZAÇÃO DE ARQUIVO           -->
    <!-- ========================================== -->
    <div id="file-viewer-modal" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-slate-900/90 backdrop-blur-sm" onclick="closeFileViewer()"></div>
        <div class="absolute inset-4 sm:inset-10 bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="file-viewer-content-box">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 px-4 py-3 border-b border-slate-200 bg-slate-50">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="p-2 bg-indigo-100 text-indigo-600 rounded-lg shrink-0">
                        <i data-lucide="file-text" class="w-5 h-5"></i>
                    </div>
                    <h3 id="file-viewer-title" class="font-bold text-slate-800 truncate">Nome_do_Arquivo.pdf</h3>
                </div>
                <div class="flex items-center gap-2 flex-wrap justify-end">
                    <button id="file-viewer-zoom-out" type="button" class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Diminuir zoom">
                        <i data-lucide="minus" class="w-5 h-5"></i>
                    </button>
                    <button id="file-viewer-reset" type="button" class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Resetar zoom/rotação">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                    <button id="file-viewer-zoom-in" type="button" class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Aumentar zoom">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                    </button>
                    <button id="file-viewer-rotate" type="button" class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Rotacionar 90°">
                        <i data-lucide="rotate-cw" class="w-5 h-5"></i>
                    </button>
                    <button id="file-viewer-fullscreen" type="button" class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Tela cheia">
                        <i data-lucide="maximize-2" class="w-5 h-5"></i>
                    </button>
                    <a id="file-viewer-download" href="#" download class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Baixar arquivo">
                        <i data-lucide="download" class="w-5 h-5"></i>
                    </a>
                    <button onclick="closeFileViewer()" class="p-2 text-slate-500 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors" title="Fechar visualização">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 bg-slate-100 relative overflow-hidden flex items-center justify-center" id="file-viewer-container">
                <div class="absolute inset-0 flex items-center justify-center text-slate-400">
                    <i data-lucide="loader-2" class="w-8 h-8 animate-spin"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Rodapé (Footer) -->
    <footer class="bg-slate-900 py-8 border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <p class="text-sm text-slate-500 text-center md:text-left">
                    &copy; <span id="current-year"></span> ChaoticDevs - Academic Supplementary Hours. Todos os direitos reservados.
                </p>
                <div class="flex space-x-6">
                    <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Termos</a>
                    <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Privacidade</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>

    <script src="../../estudante/solicitacao/js/solicitacao_modal.js"></script>
    <script src="../../../z_js/valida_sessao.js"></script>
    <script src="detalhes.js"></script>
</body>
</html>
