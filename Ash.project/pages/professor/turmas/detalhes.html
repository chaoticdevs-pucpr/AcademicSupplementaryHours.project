<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Detalhes da Turma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col selection:bg-purple-200 selection:text-purple-900">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-6">
                    <a href="../index.html" class="text-slate-400 hover:text-purple-600 transition-colors flex items-center justify-center bg-slate-50 hover:bg-purple-50 w-10 h-10 rounded-full" title="Início">
                        <i data-lucide="home" class="w-5 h-5"></i>
                    </a>
                    <div class="flex items-center gap-3 border-l border-slate-200 pl-6">
                        <div class="text-2xl font-extrabold tracking-tighter text-slate-900">
                            A.S.H<span class="text-purple-600">.</span>
                        </div>
                        <span class="bg-purple-100 text-purple-700 text-xs font-bold px-2.5 py-1 rounded-md uppercase tracking-wide">
                            Professor Validador
                        </span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button id="logoff" class="text-sm font-medium text-red-600 hover:text-red-700 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors flex items-center gap-2">
                        <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Sair</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10 lg:py-14">
        <div class="mb-8">
            <p class="text-sm font-semibold uppercase tracking-[0.2em] text-purple-600">Validação de Horas</p>
            <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight mt-2">
                <span id="turma-nome">Carregando...</span>
            </h1>
            <p id="turma-curso" class="text-slate-500 mt-3 text-base">Carregando informações...</p>
        </div>

        <!-- Guias de Status -->
        <div class="bg-white rounded-2xl border border-slate-200 p-4 lg:p-6 mb-8 flex gap-2 overflow-x-auto">
            <button id="aba-pendentes" class="px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap transition-all bg-purple-600 text-white shadow-sm">
                <i data-lucide="hourglass" class="w-4 h-4 inline mr-2"></i>
                <span id="count-pendentes">0</span> Pendentes
            </button>
            <button id="aba-aprovadas" class="px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap transition-all bg-slate-100 text-slate-700 hover:bg-slate-200">
                <i data-lucide="check-circle" class="w-4 h-4 inline mr-2"></i>
                <span id="count-aprovadas">0</span> Aprovadas
            </button>
            <button id="aba-rejeitadas" class="px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap transition-all bg-slate-100 text-slate-700 hover:bg-slate-200">
                <i data-lucide="x-circle" class="w-4 h-4 inline mr-2"></i>
                <span id="count-rejeitadas">0</span> Rejeitadas
            </button>
        </div>

        <!-- Lista de Solicitações -->
        <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 lg:px-8 py-5 border-b border-slate-200">
                <h2 class="text-xl font-bold text-slate-900">Solicitações</h2>
            </div>
            <div id="solicitacoes-container" class="divide-y divide-slate-200">
                <!-- Carregando -->
                <div class="p-6 text-center text-slate-500">
                    <i data-lucide="loader" class="w-8 h-8 inline animate-spin mb-2"></i>
                    <p class="mt-2">Carregando solicitações...</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-slate-900 py-8 border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <p class="text-sm text-slate-500 text-center md:text-left">
                    &copy; <span id="current-year"></span> ChaoticDevs - Academic Supplementary Hours. Todos os direitos reservados.
                </p>
                <div class="flex space-x-6">
                    <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Termos</a>
                    <a href="#" class="text-sm text-slate-500 hover:text-white transition-colors">Privacidade</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
    <script src="../../../../z_js/valida_sessao.js"></script>
    <script src="detalhes.js"></script>
</body>
</html>
