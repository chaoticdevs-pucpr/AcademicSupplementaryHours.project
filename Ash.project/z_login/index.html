<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH - Login</title>
    <!-- Tailwind CSS (Mesmo padrão da Landing Page) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex items-center justify-center p-4 selection:bg-purple-200 selection:text-purple-900 relative overflow-hidden">

    <!-- Background Circle (Efeito Roxo Simples no Fundo) -->
    <div class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center">
        <div class="absolute w-[400px] h-[400px] md:w-[600px] md:h-[600px] bg-purple-300/40 rounded-full blur-3xl"></div>
    </div>

    <!-- Container do Cartão de Login -->
    <div class="relative z-10 max-w-md w-full bg-white/90 backdrop-blur-sm rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-slate-100 p-8 sm:p-10 transition-all">
        
        <!-- Header (Logo e Textos) -->
        <div class="text-center mb-8">
            <div class="inline-block text-3xl font-extrabold tracking-tighter text-slate-900 mb-2">
                A.S.H<span class="text-purple-600">.</span>
            </div>
            <h1 class="text-xl font-semibold text-slate-800">Bem vindo!</h1>
            <p class="text-sm text-slate-500 mt-1">Insira as suas credenciais para aceder à plataforma.</p>
        </div>

        <!-- Formulário (Os IDs originais estão mantidos aqui) -->
        <div class="space-y-5">
            
            <!-- Campo de E-mail -->
            <div>
                <label for="usuario" class="block text-sm font-medium text-slate-700 mb-1.5">E-mail</label>
                <input 
                    type="text" 
                    id="usuario" 
                    placeholder="seu.email@instituicao.edu.br" 
                    class="w-full px-4 py-3 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 transition-colors text-slate-900"
                >
            </div>
            
            <!-- Campo de Senha -->
            <div>
                <label for="senha" class="block text-sm font-medium text-slate-700 mb-1.5">Senha</label>
                <input 
                    type="password" 
                    id="senha" 
                    placeholder="••••••••" 
                    class="w-full px-4 py-3 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 transition-colors text-slate-900"
                >
            </div>

            <!-- Botão de Envio -->
            <div class="pt-2">
                <button 
                    id="enviar" 
                    class="w-full flex justify-center items-center px-4 py-3.5 border border-transparent text-sm font-medium rounded-lg text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-600 transition-all shadow-sm hover:shadow"
                >
                    Entrar na Plataforma
                </button>
            </div>
            
        </div>

        <!-- Link para voltar -->
        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <a href="../index.html" class="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">
                &larr; Voltar para a página inicial
            </a>
        </div>
    </div>

    <!-- Script de lógica mantido -->
    <script src="login.js"></script>
</body>
</html>
